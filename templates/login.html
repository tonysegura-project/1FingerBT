<!DOCTYPE html>
<html>
<head>
    <title>Login - 1FingerBT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. Ensure the background covers the entire screen */
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* This forces the body to be at least the height of the screen */
}

/* 2. Center the container on the screen */
.container {
    max-width: 500px;
    width: 95%;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    box-sizing: border-box;
    
    /* This margin trick centers it vertically and horizontally */
    margin: auto; 
}
        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 { color: #333; margin: 0 0 10px 0; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
        .footer-link { margin-top: 20px; font-size: 14px; }
        a { color: #007bff; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
    </style>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
</head>
<body>

<div class="auth-container">
    <img src="/logo.png" alt="1FingerBT Logo" class="logo-img">

    <h2>Welcome</h2>
    <p>Log in to manage your RBT sessions</p>

    <form method="POST">
        <input name="email" type="email" placeholder="Email Address" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>

    <div class="footer-link">
        <a href="/signup">Don't have an account? Create one</a>
    </div>
</div>

</body>
</html>
