<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - 1FingerBT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* 1. Reset and Full Screen Setup */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* ABA Matrix uses a clean white background */
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center; /* Vertical center */
            justify-content: center; /* Horizontal center */
        }

        /* 2. The Login Box (Edge-to-Edge on Mobile) */
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            box-sizing: border-box;
            text-align: center;
            /* We remove shadows and borders to make it feel like a native app */
        }

        .logo-img {
            width: 140px;
            height: auto;
            margin-bottom: 30px;
            border-radius: 24px; /* Matches your stylish logo shape */
        }

        h2 {
            font-weight: 600;
            color: #222;
            margin: 0 0 8px 0;
            font-size: 28px;
            letter-spacing: -0.5px;
        }

        p {
            color: #888;
            font-size: 15px;
            margin-bottom: 40px;
        }

        /* 3. Modern Inputs (Clean Lines) */
        input {
            width: 100%;
            padding: 16px 0; /* Padding only on top/bottom for the "line" look */
            margin-bottom: 20px;
            border: none;
            border-bottom: 2px solid #eee; /* Light gray underline */
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            background: transparent;
        }

        input:focus {
            border-bottom-color: #007bff; /* Turns blue when you type */
        }

        /* 4. The Action Button */
        button {
            width: 100%;
            padding: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.2); /* Soft blue glow */
        }

        button:active {
            transform: scale(0.98); /* Feels like a real button press */
        }

        .footer-link {
            margin-top: 30px;
            font-size: 14px;
        }

        a {
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <img src="/logo.png" alt="1FingerBT Logo" class="logo-img">

    <h2>WELCOME</h2>
    <p>Log in to manage your RBT sessions</p>

    <form method="POST">
        <input name="email" type="email" placeholder="Email Address" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">SIGN IN</button>
    </form>

    <div class="footer-link">
        <a href="/signup">Don't have an account? Create one</a>
    </div>
</div>

</body>
</html>
