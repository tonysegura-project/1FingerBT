<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - 1FingerBT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .auth-container {
            max-width: 400px;
            width: 90%;
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            box-sizing: border-box;
            margin: auto; /* The magic that centers it vertically and horizontally */
            text-align: center;
        }
        .logo-img {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 15px;
        }
        h2 { color: #333; margin: 0 0 10px 0; font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
        .footer-link { margin-top: 20px; font-size: 14px; }
        a { color: #007bff; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
<div class="auth-container">
    <img src="/logo.png" alt="1FingerBT Logo" class="logo-img">
    <h2>Welcome</h2>
    <p>Log in to manage your RBT sessions</p>
    <form method="POST">
        <input name="email" type="email" placeholder="Email Address" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    <div class="footer-link">
        <a href="/signup">Don't have an account? Create one</a>
    </div>
</div>
</body>
</html>
