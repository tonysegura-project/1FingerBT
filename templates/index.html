<!DOCTYPE html>
<html lang="en">
<head>
    <title>1FingerBT - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; }

        .navbar { padding: 15px 20px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .nav-title { font-weight: bold; font-size: 1.2rem; color: #333; }

        /* The Grid Container */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns */
            grid-template-rows: 1fr 1fr;    /* 2 rows */
            gap: 15px;
            padding: 15px;
            flex: 1; /* Fills the rest of the screen */
            box-sizing: border-box;
        }

        /* Large Menu Buttons */
        .menu-btn {
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
            padding: 20px;
        }

        .menu-btn:active { transform: scale(0.95); }

        /* Button Colors */
        .blue { background-color: #007bff; }
        .orange { background-color: #fd7e14; opacity: 0.6; } /* Faded because it's empty */
        .green { background-color: #28a745; opacity: 0.6; }
        .red { background-color: #dc3545; opacity: 0.6; }

        .btn-subtitle { font-size: 12px; font-weight: normal; margin-top: 8px; opacity: 0.9; }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="nav-title">1FingerBT Dashboard</span>
    <a href="/logout" style="text-decoration: none; color: #666; font-size: 14px;">Logout</a>
</nav>

<div class="grid-container">
    <a href="/tracker" class="menu-btn blue">
        BEHAVIORS TRACKER
        <span class="btn-subtitle">Active Project</span>
    </a>

    <div class="menu-btn orange">
        MY ECONOMY TRACKER
        <span class="btn-subtitle">Coming Soon</span>
    </div>

    <div class="menu-btn green">
        SERVICES & DOCUMENTS
        <span class="btn-subtitle">Coming Soon</span>
    </div>

    <div class="menu-btn red">
        NOTES
        <span class="btn-subtitle">Coming Soon</span>
    </div>
</div>

</body>
</html>
