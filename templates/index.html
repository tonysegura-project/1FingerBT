<!DOCTYPE html>
<html>
<head>
    <title>RBT Session Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Keeping your original styling Antonio, it looked great! */
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    text-align: center;
    padding: 10px; /* Reduced padding for mobile */
    margin: 0;
    display: flex;
    justify-content: center; /* Centers the container horizontally */
}
.container {
    max-width: 500px;
    width: 100%; /* Take full width on small screens */
    margin: 10px auto; /* Centers it and adds a small top/bottom gap */
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
        input, select { padding: 12px; width: 100%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; box-sizing: border-box;}
button {
    padding: 18px; /* Slightly larger for touch */
    margin: 8px 0;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    font-size: 18px; /* Bigger text for easier reading */
    touch-action: manipulation; /* Removes the 300ms tap delay on mobile */
}
        button:hover { background: #0056b3; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        #counts li { list-style: none; background: #eee; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; }
        .danger { background: #dc3545; }

        /* 1. Makes input and button sit side-by-side */
.row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 15px;
}

.row input, .row select {
    margin-bottom: 0; 
    flex: 1; 
}

/* 2. Style for the 3-dot menu container */
.menu-container {
    position: relative;
    display: inline-block;
}

/* 3. Style for the dots button itself */
.dots-btn {
    width: 44px !important;
    height: 44px !important;
    padding: 0 !important;
    background: #666 !important;
    margin: 0 !important;
    font-size: 20px;
    line-height: 44px;
}

/* 4. The hidden menu box */
.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: 50px;
    background-color: white;
    min-width: 160px;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
    z-index: 100;
    border-radius: 8px;
}

.dropdown-content button {
    margin: 0;
    border-radius: 0;
    width: 100%;
    text-align: left;
    padding: 12px;
    background: white;
    color: red; /* Make delete stand out */
}

/* 5. Utility class to show the menu */
.show { display: block !important; }

    </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#007bff">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063176.png">

<script>
  if ('service-worker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker registered!'))
        .catch(err => console.log('Service Worker failed:', err));
    });
  }
</script>
</head>
<body>

<div class="container">
    <div style="text-align:right;"><a href="/logout"><button style="width:auto; padding:8px; background:#666;">Logout</button></a></div>
    <h1>Behavior Tracker</h1>

    <h3>Client Details</h3>
    <input type="text" id="clientName" placeholder="Enter client name">
    <button onclick="createSession()">Add Session</button>

    <hr>
<h3>Select Session</h3>
<div class="row">
    <select id="sessionSelect" onchange="loadBehaviors()"></select>
    
    <div class="menu-container">
        <button onclick="toggleMenu(event)" class="dots-btn">⋮</button>
        <div id="sessionMenu" class="dropdown-content">
            <button onclick="deleteSession()" class="danger">Delete Session</button>
        </div>
    </div>
</div>

<hr>

<h3>Track Behaviors</h3>
<div class="row">
    <input type="text" id="newBehavior" placeholder="Enter behavior (e.g. Tantrum)">
    <button onclick="addBehavior()" style="width: auto; padding: 0 20px; height: 44px; margin: 0;">Add</button>
</div>

    <div id="behaviorButtons"></div>
    <ul id="counts"></ul>
    <h3 id="totalCount">Total: 0</h3>

    <button onclick="alert('Data is auto-saved to server!')" style="background: #28a745;">SAVE DATA</button>
    <button onclick="generatePDF()" style="background: #17a2b8;">SUMMARY (PDF)</button>
</div>

<script>
let currentSessionId = null;
let behaviorData = {};

// Load sessions on startup
window.onload = fetchSessions;

function fetchSessions() {
    fetch('/get_sessions')
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById("sessionSelect");
            select.innerHTML = "";
            data.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.name} - ${s.date}</option>`;
            });
            if (data.length > 0) {
                currentSessionId = data[0].id;
                loadBehaviors();
            }
        });
}

function createSession() {
    const name = document.getElementById("clientName").value;
    if (!name) return alert("Enter client name");
    const date = new Date().toLocaleDateString();

    fetch('/create_session', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, date})
    })
    .then(res => res.json())
    .then(sessions => {
        fetchSessions();
        document.getElementById("clientName").value = "";
    });
}

function loadBehaviors() {
    currentSessionId = document.getElementById("sessionSelect").value;
    if (!currentSessionId) return;

    fetch(`/get_behaviors/${currentSessionId}`)
        .then(res => res.json())
        .then(data => {
            behaviorData = data;
            render();
        });
}

function addBehavior() {
    const behavior = document.getElementById("newBehavior").value;
    if (!behavior || !currentSessionId) return;

    fetch('/add_behavior', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({behavior, session_id: currentSessionId})
    })
    .then(res => res.json())
    .then(data => {
        behaviorData = data;
        render();
        document.getElementById("newBehavior").value = "";
    });
}

function updateCount(name) {
    fetch('/update_count', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({behavior: name, session_id: currentSessionId})
    })
    .then(res => res.json())
    .then(data => {
        behaviorData = data;
        render();
    });
}

function render() {
    const btnDiv = document.getElementById("behaviorButtons");
    const list = document.getElementById("counts");
    let total = 0;

    btnDiv.innerHTML = "";
    list.innerHTML = "";

    for (let name in behaviorData) {
        btnDiv.innerHTML += `<button onclick="updateCount('${name}')">${name}</button>`;
        list.innerHTML += `<li><span>${name}</span> <span>${behaviorData[name]}</span></li>`;
        total += behaviorData[name];
    }
    document.getElementById("totalCount").innerText = "Total behaviors: " + total;
}

function deleteSession() {
    if (!confirm("Delete this session?") || !currentSessionId) return;
    fetch(`/delete_session/${currentSessionId}`, {method: 'POST'})
        .then(() => fetchSessions());
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const select = document.getElementById("sessionSelect");
    const sessionText = select.options[select.selectedIndex].text;

    doc.setFontSize(18);
    doc.text("Session Summary Report", 105, 20, {align: 'center'});
    doc.setFontSize(12);
    doc.text(`Client Info: ${sessionText}`, 20, 40);

    let y = 60;
    doc.text("Behavior", 20, y);
    doc.text("Count", 160, y);
    doc.line(20, y+2, 190, y+2);
    
    y += 10;
    for (let name in behaviorData) {
        doc.text(name, 20, y);
        doc.text(behaviorData[name].toString(), 165, y);
        y += 10;
    }
    doc.save(`Session_Summary.pdf`);
}

// Function to show/hide the 3-dot menu
function toggleMenu(event) {
    event.stopPropagation(); // Prevents the click from closing the menu immediately
    document.getElementById("sessionMenu").classList.toggle("show");
}

// Automatically close the menu if you click anywhere else on the screen
window.onclick = function(event) {
    if (!event.target.matches('.dots-btn')) {
        var dropdowns = document.getElementsByClassName("dropdown-content");
        for (var i = 0; i < dropdowns.length; i++) {
            var openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) {
                openDropdown.classList.remove('show');
            }
        }
    }
}
</script>
</body>
</html>
